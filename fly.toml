# fly.toml app configuration file generated for proyecto-final-progra-iv-2025 on 2026-06-10T22:21:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'proyecto-final-progra-iv-2025'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
